<svg xmlns="http://www.w3.org/2000/svg" viewBox="28 28 344 344">

<defs>
  <clipPath id="moonClip">
    <circle cx="200" cy="200" r="120"/>
  </clipPath>
  <linearGradient id="moonGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0ea5e9"/>
    <stop offset="100%" stop-color="#6366f1"/>
  </linearGradient>
</defs>

<circle cx="200" cy="200" r="140" fill="none" stroke="#0ea5e9" stroke-width="0.3" opacity="0.3"/>
<circle cx="200" cy="200" r="155" fill="none" stroke="#6366f1" stroke-width="0.3" opacity="0.2"/>
<circle cx="200" cy="200" r="170" fill="none" stroke="#6366f1" stroke-width="0.3" opacity="0.1"/>

<circle cx="200" cy="200" r="120" fill="url(#moonGrad)" opacity="0.9"/>
<circle cx="240" cy="200" r="95" fill="#0c0e13" opacity="0.85"/>

<g clip-path="url(#moonClip)" opacity="0.25">
  <circle cx="150" cy="160" r="12" fill="#e0f2fe" opacity="0.3"/>
  <circle cx="130" cy="230" r="8" fill="#e0f2fe" opacity="0.2"/>
  <circle cx="170" cy="270" r="6" fill="#e0f2fe" opacity="0.25"/>
  <circle cx="120" cy="190" r="4" fill="#e0f2fe" opacity="0.15"/>
  <circle cx="160" cy="210" r="3" fill="#e0f2fe" opacity="0.2"/>
  <circle cx="140" cy="150" r="5" fill="#e0f2fe" opacity="0.15"/>
  <circle cx="110" cy="240" r="3" fill="#e0f2fe" opacity="0.2"/>
</g>

<g transform="translate(200 200)" opacity="0.9">
  <rect x="-45" y="-8" width="3" height="16" rx="1.5" fill="#e0f2fe" opacity="0.6"/>
  <rect x="-38" y="-18" width="3" height="36" rx="1.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="-31" y="-28" width="3" height="56" rx="1.5" fill="#e0f2fe" opacity="0.8"/>
  <rect x="-24" y="-38" width="3" height="76" rx="1.5" fill="#e0f2fe" opacity="0.9"/>
  <rect x="-17" y="-22" width="3" height="44" rx="1.5" fill="#e0f2fe" opacity="0.85"/>
  <rect x="-10" y="-32" width="3" height="64" rx="1.5" fill="#e0f2fe"/>
  <rect x="-3" y="-12" width="3" height="24" rx="1.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="4" y="-26" width="3" height="52" rx="1.5" fill="#e0f2fe" opacity="0.85"/>
  <rect x="11" y="-40" width="3" height="80" rx="1.5" fill="#e0f2fe" opacity="0.95"/>
  <rect x="18" y="-20" width="3" height="40" rx="1.5" fill="#e0f2fe" opacity="0.75"/>
  <rect x="25" y="-30" width="3" height="60" rx="1.5" fill="#e0f2fe" opacity="0.8"/>
  <rect x="32" y="-14" width="3" height="28" rx="1.5" fill="#e0f2fe" opacity="0.65"/>
  <rect x="39" y="-6" width="3" height="12" rx="1.5" fill="#e0f2fe" opacity="0.5"/>
</g>

<!-- Orbiting dots at exact orbit radii: 135, 150, 165 from center (200,200) -->
<circle cx="303.4" cy="113.2" r="4" fill="#38bdf8" opacity="0.8"/>
<circle cx="59.0" cy="148.7" r="2.5" fill="#818cf8" opacity="0.6"/>
<circle cx="228.7" cy="362.5" r="2" fill="#a78bfa" opacity="0.4"/>

</svg>
