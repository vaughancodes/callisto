server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed asset files get aggressive caching — Vite fingerprints the
    # filename on build so cache-busting is automatic.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SVGs, icons, and other static files
    location ~* \.(svg|ico|png|jpg|jpeg|webp|woff2?)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback (single-page, no client routing, but protects deep links)
    location / {
        try_files $uri /index.html;
    }

    # Gzip text assets on the fly
    gzip on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 256;
}
